checks:
  javascript: true

build:
  nodes:
    analysis:
      environment:
        node: v16
      project_setup:
        override: true
      tests:
        override:
          - js-scrutinizer-run
          - command: npm run test:coverage
            coverage:
              file: coverage/clover.xml
              format: clover

filter:
  excluded_paths:
    - "build/*"
    - "coverage/*"
    - "dist/*"
    - "node_modules/*"
